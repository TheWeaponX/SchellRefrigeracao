<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="36" height="36">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4892d" />
      <stop offset="100%" stop-color="#d9a44e" />
    </linearGradient>
  </defs>
  
  <!-- Floco de neve (linhas cruzadas) -->
  <g stroke="url(#goldGrad)" stroke-width="2.2" stroke-linecap="round">
    <!-- Linhas principais -->
    <line x1="50" y1="8" x2="50" y2="92" />
    <line x1="8" y1="50" x2="92" y2="50" />
    <line x1="20.3" y1="20.3" x2="79.7" y2="79.7" />
    <line x1="79.7" y1="20.3" x2="20.3" y2="79.7" />
    
    <!-- Ramos do floco (diagonais curtas) -->
    <line x1="50" y1="8" x2="42" y2="20" />
    <line x1="50" y1="8" x2="58" y2="20" />
    <line x1="50" y1="92" x2="42" y2="80" />
    <line x1="50" y1="92" x2="58" y2="80" />
    <line x1="8" y1="50" x2="20" y2="42" />
    <line x1="8" y1="50" x2="20" y2="58" />
    <line x1="92" y1="50" x2="80" y2="42" />
    <line x1="92" y1="50" x2="80" y2="58" />
    <line x1="20.3" y1="20.3" x2="30" y2="30" />
    <line x1="20.3" y1="20.3" x2="30" y2="30" />
    <line x1="79.7" y1="79.7" x2="70" y2="70" />
    <line x1="79.7" y1="79.7" x2="70" y2="70" />
    <line x1="79.7" y1="20.3" x2="70" y2="30" />
    <line x1="79.7" y1="20.3" x2="70" y2="30" />
    <line x1="20.3" y1="79.7" x2="30" y2="70" />
    <line x1="20.3" y1="79.7" x2="30" y2="70" />
  </g>
  
  <!-- Triângulos decorativos (pontas do floco) -->
  <g fill="url(#goldGrad)">
    <polygon points="50,4 46,12 54,12" />
    <polygon points="50,96 46,88 54,88" />
    <polygon points="4,50 12,46 12,54" />
    <polygon points="96,50 88,46 88,54" />
    <polygon points="16,16 22,22 22,16" />
    <polygon points="84,84 78,78 78,84" />
    <polygon points="84,16 78,22 84,22" />
    <polygon points="16,84 22,78 16,78" />
  </g>
  
  <!-- Letra S central -->
  <text x="50" y="67" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="38" font-weight="500" fill="url(#goldGrad)" letter-spacing="0">S</text>
</svg>
